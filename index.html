<!DOCTYPE html>
<html lang="id">
<head>

  <title>Musik+ Studio</title>

  <style>
    /* ========== SEMUA CSS GLOBAL ========== */
    :root {
      --bg-primary: #1a1a2e; --bg-secondary: #16213e; --bg-tertiary: #0f3460;
      --text-primary: #e0e0ff; --text-secondary: #a0a0c0; --text-muted: #6a6a8a;
      --accent-primary: #e94560; --accent-hover: #c23152; --accent-light: #ff6b9d;
      --color-success: #2ecc71; --color-danger: #e74c3c; --color-warning: #f39c12;
      --color-info: #3498db; --color-pink: #fd79a8;
      --border-color: rgba(255,255,255,0.08); --border-color-strong: rgba(255,255,255,0.15);
      --radius-sm: 8px; --radius-md: 12px; --radius-lg: 16px;
      --spacing-sm: 8px; --spacing-md: 12px; --spacing-lg: 16px; --spacing-xl: 20px;
      --shadow-md: 0 4px 20px rgba(0,0,0,0.6);
    }
    body.light-theme {
      --bg-primary: #f5f5fa; --bg-secondary: #ffffff; --bg-tertiary: #e8e8f0;
      --text-primary: #1e1e2f; --text-secondary: #4a4a6a; --text-muted: #7a7a9a;
      --border-color: rgba(0,0,0,0.08); --border-color-strong: rgba(0,0,0,0.12);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-primary); color: var(--text-primary);
      min-height: 100vh; transition: background 0.3s, color 0.3s;
    }
    .app-shell { display: flex; flex-direction: column; min-height: 100vh; }
    .app-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: var(--spacing-md) var(--spacing-xl); background: var(--bg-secondary);
      border-bottom: 1px solid var(--border-color); position: sticky; top: 0; z-index: 10;
    }
    .app-logo { font-size: 1.3rem; font-weight: 700; cursor: pointer; }
    .main-content { flex: 1; padding: var(--spacing-xl); animation: fadeIn 0.3s; }
    .btn {
      display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px;
      border-radius: var(--radius-sm); font-weight: 600; cursor: pointer; border: none;
      font-size: 0.85rem; background: var(--bg-tertiary); color: var(--text-primary);
    }
    .btn-primary { background: var(--accent-primary); color: #fff; }
    .btn-outline { background: transparent; border: 2px solid var(--accent-primary); color: var(--accent-light); }
    .btn-sm { padding: 4px 12px; font-size: 0.8rem; }
    .btn-lg { padding: 12px 28px; font-size: 1rem; }
    .btn-block { width: 100%; justify-content: center; }
    .btn-success { background: var(--color-success); color: #fff; }
    .btn-danger { background: var(--color-danger); color: #fff; }
    .btn-warning { background: var(--color-warning); color: #000; }
    .toast-container { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); z-index: 9999; pointer-events: none; }
    .toast {
      background: var(--bg-secondary); color: var(--text-primary); padding: 10px 20px;
      border-radius: var(--radius-sm); border: 1px solid var(--border-color);
      box-shadow: 0 8px 32px rgba(0,0,0,0.7); font-size: 0.9rem; opacity: 0;
      transform: translateY(20px); transition: 0.3s; margin-bottom: 8px;
      border-left: 4px solid var(--accent-primary); pointer-events: auto;
    }
    .toast.show { opacity: 1; transform: translateY(0); }
    .hidden { display: none !important; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
    .section-header h2 { font-size: 1.5rem; font-weight: 700; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; margin-bottom: 6px; font-size: 0.85rem; color: var(--text-secondary); }
    .form-group input, .form-group textarea, .form-group select {
      width: 100%; padding: 10px 14px; border: 1px solid var(--border-color-strong);
      border-radius: var(--radius-sm); background: var(--bg-tertiary); color: var(--text-primary);
      font-size: 0.9rem; font-family: inherit;
    }
    .form-error, .form-success { font-size: 0.85rem; padding: 8px 12px; border-radius: var(--radius-sm); margin-top: 8px; display: none; }
    .form-error.show { display: block; background: rgba(231,76,60,0.1); color: var(--color-danger); }
    .form-success.show { display: block; background: rgba(46,204,113,0.1); color: var(--color-success); }
    .modal-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center;
      z-index: 998; padding: var(--spacing-lg);
    }
    .modal-overlay.show { display: flex; }
    .modal-content {
      background: var(--bg-secondary); border-radius: var(--radius-lg); max-width: 500px; width: 100%;
      padding: 24px; border: 1px solid var(--border-color); max-height: 85vh; overflow-y: auto;
    }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .modal-header h3 { font-size: 1.2rem; font-weight: 700; }
    .modal-close { background: none; border: none; font-size: 1.5rem; color: var(--text-secondary); cursor: pointer; }
    .modal-footer { display: flex; justify-content: flex-end; gap: 12px; margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--border-color); }
    /* tambahan CSS modul */
    .landing-page, .auth-page, .dashboard-page, .proyek-list-page, .editor-page,
    .upload-page, .rekam-page, .stem-page, .mixer-page, .lirik-sync-page,
    .lirik-display-page, .transpose-page, .modifikasi-page, .ai-generator-page,
    .voice-select-page, .lyrics-gen-page, .hasil-page, .download-page,
    .premium-page, .admin-page, .chat-page, .backup-page, .settings-page, .help-page, .profile-page {
      max-width: 900px; margin: 0 auto;
    }
    .hero { text-align: center; padding: 40px 20px; background: var(--bg-secondary); border-radius: var(--radius-lg); border: 1px solid var(--border-color); margin-bottom: 30px; }
    .hero-icon { font-size: 4rem; margin-bottom: 16px; }
    .gradient-text { font-size: 2.2rem; font-weight: 800; background: linear-gradient(135deg, var(--accent-light), #ff9a9e); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .hero-description { color: var(--text-secondary); max-width: 600px; margin: 0 auto 24px; }
    .hero-buttons { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    .features-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; margin-bottom: 30px; }
    .feature-card { background: var(--bg-secondary); padding: 24px; border-radius: var(--radius-md); border: 1px solid var(--border-color); text-align: center; }
    .feature-icon { font-size: 2.5rem; margin-bottom: 12px; }
    .feature-card h4 { font-size: 1.1rem; margin-bottom: 8px; }
    .feature-card p { font-size: 0.85rem; color: var(--text-secondary); }
    .price-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 20px; margin-bottom: 20px; }
    .price-card { background: var(--bg-secondary); padding: 30px 20px; border-radius: var(--radius-lg); border: 2px solid var(--border-color); text-align: center; cursor: pointer; position: relative; }
    .price-card.featured { border-color: var(--accent-primary); }
    .featured-badge { position: absolute; top: -12px; left: 50%; transform: translateX(-50%); background: var(--accent-primary); color: #fff; padding: 3px 16px; border-radius: 20px; font-size: 0.7rem; font-weight: 700; }
    .price-icon { font-size: 2.5rem; margin-bottom: 10px; }
    .price-name { font-size: 1.2rem; font-weight: 700; }
    .price-value { font-size: 2rem; font-weight: 800; color: var(--color-success); margin: 10px 0; }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 16px; margin-bottom: 24px; }
    .stat-card { background: var(--bg-secondary); padding: 20px; border-radius: var(--radius-md); border: 1px solid var(--border-color); text-align: center; }
    .stat-icon { font-size: 1.5rem; } .stat-value { font-size: 1.6rem; font-weight: 700; color: var(--accent-light); } .stat-label { font-size: 0.8rem; color: var(--text-secondary); }
    .quick-actions { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 16px; margin-bottom: 24px; }
    .action-card { background: var(--bg-secondary); padding: 20px; border-radius: var(--radius-md); border: 1px solid var(--border-color); cursor: pointer; text-align: center; }
    .action-icon { font-size: 2rem; } .action-card h4 { font-size: 0.95rem; margin: 8px 0 4px; } .action-card p { font-size: 0.8rem; color: var(--text-secondary); }
    .dashboard-welcome { display: flex; align-items: center; gap: 20px; padding: 24px; background: var(--bg-secondary); border-radius: var(--radius-lg); border: 1px solid var(--border-color); margin-bottom: 24px; }
    .welcome-avatar { width: 56px; height: 56px; border-radius: 50%; background: linear-gradient(135deg, var(--accent-primary), var(--accent-light)); display: flex; align-items: center; justify-content: center; font-size: 1.5rem; color: #fff; font-weight: 700; }
    .welcome-text h2 { font-size: 1.3rem; font-weight: 700; }
    .welcome-text p { color: var(--text-secondary); }
    .proyek-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; margin-bottom: 24px; }
    .proyek-card { background: var(--bg-secondary); padding: 16px; border-radius: var(--radius-md); border: 1px solid var(--border-color); }
    .proyek-actions { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
    .editor-header { display: flex; align-items: center; justify-content: space-between; gap: 16px; margin-bottom: 20px; flex-wrap: wrap; }
    .transport-bar { display: flex; align-items: center; gap: 12px; padding: 12px 16px; background: var(--bg-secondary); border-radius: var(--radius-md); margin-bottom: 20px; }
    .track-list { margin-bottom: 20px; }
    .track-item { background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: var(--radius-sm); padding: 12px; margin-bottom: 12px; }
    .track-header { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .track-name { font-weight: 600; min-width: 120px; }
    .track-controls { display: flex; align-items: center; gap: 8px; }
    .auth-container { background: var(--bg-secondary); border-radius: var(--radius-lg); padding: 30px; max-width: 420px; margin: 0 auto; }
    .auth-tabs { display: flex; gap: 4px; margin-bottom: 24px; background: var(--bg-tertiary); border-radius: var(--radius-sm); padding: 4px; }
    .auth-tab { flex: 1; padding: 10px; border: none; background: transparent; color: var(--text-secondary); font-weight: 600; font-size: 0.85rem; border-radius: var(--radius-sm); cursor: pointer; }
    .auth-tab.active { background: var(--accent-primary); color: #fff; }
    .auth-form h3 { font-size: 1.2rem; font-weight: 700; margin-bottom: 20px; text-align: center; }
    .auth-switch { text-align: center; margin-top: 16px; font-size: 0.85rem; color: var(--text-secondary); }
    .auth-switch span { color: var(--accent-light); cursor: pointer; font-weight: 600; }
    .chat-messages { height: 300px; overflow-y: auto; margin-bottom: 12px; padding: 8px; background: var(--bg-tertiary); border-radius: var(--radius-sm); }
    .chat-bubble { margin-bottom: 8px; padding: 8px 12px; border-radius: var(--radius-sm); max-width: 80%; }
    .chat-bubble.me { background: var(--accent-primary); color: #fff; margin-left: auto; }
    .chat-bubble.other { background: var(--bg-hover); color: var(--text-primary); }
    .chat-input-row { display: flex; gap: 8px; } .chat-input-row input { flex: 1; }
    .admin-tabs { display: flex; gap: 4px; margin-bottom: 16px; }
    .admin-tab { padding: 8px 16px; border: 2px solid var(--accent-primary); background: transparent; color: var(--accent-light); border-radius: var(--radius-sm); cursor: pointer; font-weight: 600; }
    .admin-tab.active { background: var(--accent-primary); color: #fff; }
    .admin-table { width: 100%; border-collapse: collapse; } .admin-table th, .admin-table td { padding: 6px 10px; border: 1px solid var(--border-color); }
    .badge { display: inline-flex; padding: 2px 12px; border-radius: 12px; font-size: 0.75rem; font-weight: 600; background: var(--accent-primary); color: #fff; }
    .empty-state { text-align: center; padding: 40px; color: var(--text-secondary); }
    .empty-icon { font-size: 3rem; }
    .premium-banner { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; background: linear-gradient(135deg, var(--accent-primary), var(--accent-light)); border-radius: var(--radius-md); color: #fff; margin-bottom: 24px; }
    .premium-action { opacity: 0.8; }
    .spinner { width: 30px; height: 30px; border: 3px solid var(--border-color); border-top-color: var(--accent-primary); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .header-actions { display: flex; align-items: center; gap: 8px; }
    .user-badge { cursor: pointer; display: flex; align-items: center; gap: 8px; padding: 4px 12px; background: var(--bg-tertiary); border-radius: 20px; }
    .user-avatar { width: 28px; height: 28px; border-radius: 50%; background: var(--accent-primary); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 700; }
  </style>
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <div class="app-logo" onclick="MS.navigate('dashboard')">🎵 Musik+ Studio</div>
      <div class="header-actions" id="headerActions">
        <div id="headerGuest">
          <button class="btn btn-sm" onclick="toggleTheme()">🌓 Tema</button>

    <main class="main-content" id="appContainer">
      <div id="initialLoader" style="text-align:center;padding:40px;">Memuat...</div>

    <div class="toast-container" id="toastContainer"></div>
  </div>

        <div class="form-group">

<script>
  // ========== FUNGSI GLOBAL ==========
  function toggleTheme() {
    document.body.classList.toggle('light-theme');
    localStorage.setItem('ms_theme', document.body.classList.contains('light-theme') ? 'light' : 'dark');
  }
  (function() { if (localStorage.getItem('ms_theme') === 'light') document.body.classList.add('light-theme'); })();

  function showToast(msg, type) {
    const container = document.getElementById('toastContainer');
    if (!container) return;
    const t = document.createElement('div'); t.className = 'toast toast-' + (type||'info'); t.textContent = msg;
    container.appendChild(t); requestAnimationFrame(() => t.classList.add('show'));
    setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 300); }, 3000);
  }

  // ========== CORE ENGINE ==========
  (function() {
    const MS = window.MS || {};
    const PREFIX = 'ms_';
    const DEFAULT_ADMIN = { id:'sa', username:'superadmin', password:btoa('admin123'), nama:'Super Admin', email:'admin@musikplus.com', hp:'081220285226', role:'superadmin', premium:true, premiumExpiry:null, locked:false };
    const DEFAULT_PACKAGES = [
      { id:'1bulan', name:'Basic', price:25000, days:30, label:'1 Bulan' },
      { id:'3bulan', name:'Premium', price:50000, days:90, label:'3 Bulan' },
      { id:'6bulan', name:'Enterprise', price:75000, days:180, label:'6 Bulan' }
    ];

    function storageGet(key, def) { try { const v = localStorage.getItem(PREFIX + key); return v ? JSON.parse(v) : def; } catch(e) { return def; } }
    function storageSet(key, val) { localStorage.setItem(PREFIX + key, JSON.stringify(val)); }
    function getAllUsers() { return storageGet('users', []); }
    function saveAllUsers(u) { storageSet('users', u); }
    function getSession() { return storageGet('session', null); }
    function saveSession(s) { storageSet('session', s); }
    function clearSession() { localStorage.removeItem(PREFIX + 'session'); }
    function getValidCodes() { return storageGet('validCodes', {}); }
    function saveValidCodes(c) { storageSet('validCodes', c); }
    function getPackages() { return storageGet('packages', DEFAULT_PACKAGES); }
    function savePackages(p) { storageSet('packages', p); }
    function getChatMessages() { return storageGet('chatMessages', []); }
    function saveChatMessages(m) { storageSet('chatMessages', m); }
    function getProjects(username) { const all = storageGet('projects', {}); return all[username] || []; }
    function saveProjects(username, proj) { const all = storageGet('projects', {}); all[username] = proj; storageSet('projects', all); }

    function escapeHTML(s) { return s ? s.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[m]) : ''; }
    function formatDate(iso) { return iso ? new Date(iso).toLocaleDateString('id-ID', { year:'numeric', month:'short', day:'numeric' }) : '-'; }
    function formatPrice(p) { return 'Rp ' + p.toLocaleString('id-ID'); }

    function navigate(page, params) {
      const container = document.getElementById('appContainer');
      if (!container) return;
      const template = document.getElementById('modul-' + page);
      if (template) {
        container.innerHTML = template.innerHTML;
        if (typeof MS.pageInit === 'function') setTimeout(() => MS.pageInit(page, params), 10);
      } else {
        container.innerHTML = '<div class="text-center" style="padding:40px;"><h2>⚠️ Halaman tidak ditemukan</h2><button class="btn btn-primary" onclick="MS.navigate(\'dashboard\')">Kembali</button></div>';
      }
    }

    function isPremium() {
      const s = getSession(); if (!s) return false;
      if (s.role === 'superadmin') return true;
      if (!s.premium) return false;
      if (s.premiumExpiry && new Date(s.premiumExpiry) < new Date()) {
        s.premium = false; s.premiumExpiry = null; saveSession(s);
        const users = getAllUsers(); const idx = users.findIndex(u => u.id === s.id);
        if (idx !== -1) { users[idx].premium = false; users[idx].premiumExpiry = null; saveAllUsers(users); }
        return false;
      }
      return true;
    }

    function activatePremium(code) {
      const s = getSession(); if (!s) return { success: false, message: 'Login dulu!' };
      const codes = getValidCodes(); const cd = codes[code];
      if (!cd) return { success: false, message: 'Kode tidak valid.' };
      if (cd.used) return { success: false, message: 'Kode sudah digunakan.' };
      const pkg = getPackages().find(p => p.id === cd.packageId) || getPackages()[0];
      const exp = new Date(Date.now() + pkg.days * 86400000);
      const users = getAllUsers(); const idx = users.findIndex(u => u.id === s.id);
      if (idx === -1) return { success: false, message: 'User tidak valid.' };
      users[idx].premium = true; users[idx].premiumExpiry = exp.toISOString(); saveAllUsers(users);
      cd.used = true; cd.usedBy = s.username; cd.usedAt = new Date().toISOString(); codes[code] = cd; saveValidCodes(codes);
      s.premium = true; s.premiumExpiry = exp.toISOString(); saveSession(s);
      return { success: true, message: `Premium aktif hingga ${formatDate(exp.toISOString())}.` };
    }

    function logout() { clearSession(); updateHeader(); navigate('landing'); showToast('Logout berhasil.', 'info'); }

    Object.assign(MS, { navigate, escapeHTML, formatDate, formatPrice, storageGet, storageSet, getAllUsers, saveAllUsers, getSession, saveSession, clearSession, getValidCodes, saveValidCodes, getPackages, savePackages, getChatMessages, saveChatMessages, getProjects, saveProjects, isPremium, activatePremium, logout });
    window.MS = MS;

    function init() {
      const users = getAllUsers();
      if (!users.find(u => u.role === 'superadmin')) { users.push(DEFAULT_ADMIN); saveAllUsers(users); }
      document.getElementById('initialLoader').remove();
      const session = getSession();
      updateHeader();
      if (session) navigate('dashboard'); else navigate('landing');
    }
    document.addEventListener('DOMContentLoaded', init);
  })();

  // ========== UPDATE HEADER ==========
  function updateHeader() {
    const session = MS.getSession();
    const guestEl = document.getElementById('headerGuest');
    const userEl = document.getElementById('headerUser');
    const adminBtn = document.getElementById('headerAdminBtn');
    if (session) {
      if (guestEl) guestEl.classList.add('hidden');
      if (userEl) userEl.classList.remove('hidden');
      document.getElementById('headerAvatar').textContent = session.nama.charAt(0).toUpperCase();
      document.getElementById('headerUserName').textContent = session.nama;
      if (adminBtn) adminBtn.classList.toggle('hidden', session.role !== 'superadmin');
    } else {
      if (guestEl) guestEl.classList.remove('hidden');
      if (userEl) userEl.classList.add('hidden');
    }
  }

  // ========== DOWNLOAD ==========
  function downloadCurrentPage(filename) {
    const html = '<!DOCTYPE html>\n' + document.documentElement.outerHTML;
    const blob = new Blob([html], { type: 'text/html' });
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = filename; a.click();
    showToast('✅ Halaman di-download!', 'success');
  }

  // ========== AUTH ==========
  function switchAuthTab(tab) {
    document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.auth-form').forEach(f => f.classList.add('hidden'));
    const tabEl = document.getElementById('tab' + tab.charAt(0).toUpperCase() + tab.slice(1));
    const formEl = document.getElementById('form' + tab.charAt(0).toUpperCase() + tab.slice(1));
    if (tabEl) tabEl.classList.add('active'); if (formEl) formEl.classList.remove('hidden');
    document.querySelectorAll('.form-error,.form-success').forEach(e => { e.textContent = ''; e.classList.remove('show'); });
  }
  function handleLogin() {
    const u = document.getElementById('loginUsername').value.trim(), p = document.getElementById('loginPassword').value;
    const err = document.getElementById('loginError'); err.textContent = ''; err.classList.remove('show');
    if (!u || !p) { err.textContent = 'Isi semua field!'; err.classList.add('show'); return; }
    if (u === 'superadmin' && p === 'admin123') {
      MS.saveSession({ id:'sa', username:'superadmin', nama:'Super Admin', role:'superadmin', premium:true });
      updateHeader(); MS.navigate('dashboard'); showToast('Login Super Admin!', 'success'); return;
    }
    const user = MS.getAllUsers().find(x => (x.username===u||x.email===u) && p===atob(x.password));
    if (!user) { err.textContent = 'Username/password salah!'; err.classList.add('show'); return; }
    if (user.locked) { err.textContent = 'Akun terkunci!'; err.classList.add('show'); return; }
    MS.saveSession(user); updateHeader(); MS.navigate('dashboard'); showToast('Selamat datang!', 'success');
  }
  function handleRegister() {
    const n = document.getElementById('regNama').value.trim(), e = document.getElementById('regEmail').value.trim();
    const hp = document.getElementById('regHp').value.trim(), un = document.getElementById('regUsername').value.trim();
    const pw = document.getElementById('regPassword').value, cp = document.getElementById('regPasswordConfirm').value;
    const err = document.getElementById('regError'), suc = document.getElementById('regSuccess');
    err.textContent = ''; err.classList.remove('show'); suc.textContent = ''; suc.classList.remove('show');
    if (!n||!e||!hp||!un||!pw||!cp) { err.textContent = 'Semua field wajib!'; err.classList.add('show'); return; }
    if (pw !== cp) { err.textContent = 'Password tidak cocok!'; err.classList.add('show'); return; }
    const users = MS.getAllUsers();
    if (users.find(x => x.username===un)) { err.textContent = 'Username sudah dipakai!'; err.classList.add('show'); return; }
    users.push({ id:Date.now().toString(), nama:n, email:e, hp, username:un, password:btoa(pw), role:'user', premium:false, premiumExpiry:null, locked:false });
    MS.saveAllUsers(users); suc.textContent = 'Pendaftaran berhasil!'; suc.classList.add('show');
    setTimeout(() => switchAuthTab('login'), 2000);
  }
  function handleForgotPassword() {
    const n = document.getElementById('forgotNama').value.trim();
    if (!n) { showToast('Isi nama!', 'error'); return; }
    const msgs = MS.getChatMessages();
    msgs.push({ from:'guest', to:'admin', text:'[RESET PASSWORD] ' + n, time:new Date().toISOString() });
    MS.saveChatMessages(msgs); showToast('Permintaan dikirim.', 'success'); switchAuthTab('login');
  }
</script>

    function useLyricVersion(i) { const l = window._generatedLyrics[i]?.text || ''; localStorage.setItem('ms_selected_lyrics', l); showToast('Lirik dipilih!', 'success'); setTimeout(() => MS.navigate('ai-generator'), 1000); }

    // ========== HASIL GENERATE & DOWNLOAD MANAGER ==========
    function renderHasil(results) { const container = document.getElementById('hasilContainer'); if (container) container.innerHTML = results.map((r,i) => `<div class="hasil-card"><h4>${r.name}</h4><p>${r.desc}</p></div>`).join(''); }
    function previewHasil(i) { showToast('Preview: simulasi', 'info'); }
    function simpanKeProyek(i) { showToast('Disimpan ke proyek (simulasi)', 'success'); }
    function downloadHasil(i) { showToast('Lirik di-download (simulasi)', 'success'); }
    function renderDownloadList(list) { const container = document.getElementById('downloadList'); if (container) container.innerHTML = list.length===0 ? '<p class="text-secondary">Belum ada file.</p>' : list.map((item,i) => `<div class="download-item">${item.name}</div>`).join(''); }
    function hapusDownload(i) { showToast('Log dihapus.', 'info'); }

    // ========== PREMIUM ==========
    function renderPremiumPackages() {
      const grid = document.getElementById('premiumPriceGrid');
      if (!grid) return;
      const packages = MS.getPackages();
      grid.innerHTML = packages.map((pkg, i) => `
        <div class="price-card ${i === 1 ? 'featured' : ''}">
          ${i === 1 ? '<div class="featured-badge">POPULER</div>' : ''}
          <div class="price-icon">💎</div>
          <div class="price-name">${pkg.name}</div>
          <div class="price-value">${MS.formatPrice(pkg.price)}</div>
          <div class="price-duration">${pkg.label}</div>
        </div>
      `).join('');
    }

    function aktivasiPremium() {
      const code = document.getElementById('activationCode').value.trim();
      const err = document.getElementById('activationError');
      const suc = document.getElementById('activationSuccess');
      
      err.textContent = ''; err.classList.remove('show');
      suc.textContent = ''; suc.classList.remove('show');
      
      if (!code) {
        err.textContent = 'Masukkan kode aktivasi terlebih dahulu!';
        err.classList.add('show');
        return;
      }

      const result = MS.activatePremium(code);
      
      if (result.success) {
        suc.textContent = result.message;
        suc.classList.add('show');
        document.getElementById('activationCode').value = '';
        updateHeader();
        const s = MS.getSession();
        if (s) {
          const statusEl = document.getElementById('premiumStatusText');
          const expEl = document.getElementById('premiumExpiryText');
          if (statusEl) { statusEl.textContent = '⭐ Premium Aktif'; statusEl.style.color = 'var(--color-success)'; }
          if (expEl && s.premiumExpiry) { expEl.textContent = 'Berlaku hingga ' + MS.formatDate(s.premiumExpiry); }
        }
        showToast(result.message, 'success');
      } else {
        err.textContent = result.message;
        err.classList.add('show');
        showToast(result.message, 'error');
      }
    }

    // ========== ADMIN PANEL ==========
    function switchAdminTab(tab) {
      document.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.admin-tab').forEach(t => { if (t.textContent.toLowerCase().includes(tab)) t.classList.add('active'); });
      const content = document.getElementById('adminTabContent'); if (!content) return;
      if (tab === 'users') { const users = MS.getAllUsers(); content.innerHTML = `<h3>Daftar User</h3><table class="admin-table"><tr><th>Nama</th><th>Username</th><th>Email</th><th>Premium</th><th>Aksi</th></tr>${users.map(u => `<tr><td>${u.nama}</td><td>${u.username}</td><td>${u.email}</td><td>${u.premium?'Ya':'Tidak'}</td><td><button class="btn btn-sm btn-warning" onclick="toggleLockUser('${u.id}')">${u.locked?'Buka':'Kunci'}</button>${u.role!=='superadmin'?`<button class="btn btn-sm btn-danger" onclick="hapusUser('${u.id}')">Hapus</button>`:''}</td></tr>`).join('')}</table>`; }
      else if (tab === 'codes') { content.innerHTML = `<h3>Buat Kode Aktivasi</h3><div class="form-group"><input id="adminCodeUser" placeholder="Username"></div><div class="form-group"><select id="adminCodePackage">${MS.getPackages().map(p => `<option value="${p.id}">${p.name} - ${p.label}</option>`).join('')}</select></div><button class="btn btn-success" onclick="buatKode()">Buat Kode</button><div id="codeResult"></div><h4>Kode Aktif</h4><div id="activeCodes"></div>`; renderActiveCodes(); }
      else if (tab === 'packages') { content.innerHTML = `<h3>Paket Premium</h3><div id="packageList"></div><button class="btn btn-primary btn-sm" onclick="tambahPaket()">+ Paket Baru</button>`; renderPackageList(); }
      else if (tab === 'backup') { content.innerHTML = `<h3>💾 Backup & Restore</h3><button class="btn btn-primary btn-block" onclick="backupAllDataJSON()">⬇ Backup Data (JSON)</button><label class="btn btn-warning btn-block" style="cursor:pointer;">📤 Restore Data (JSON)<input type="file" accept=".json" onchange="restoreAllDataJSON(this)" hidden></label><hr><button class="btn btn-success btn-block" onclick="downloadOfflineHTML()">⬇ Download HTML (Offline)</button><label class="btn btn-warning btn-block" style="cursor:pointer;">📤 Restore HTML<input type="file" accept=".html" onchange="restoreFromHTML(this)" hidden></label>`; }
    }
    function toggleLockUser(uid) { const users = MS.getAllUsers(); const u = users.find(x=>x.id===uid); if (u) { u.locked=!u.locked; MS.saveAllUsers(users); switchAdminTab('users'); } }
    function hapusUser(uid) { if (confirm('Hapus user ini?')) { MS.saveAllUsers(MS.getAllUsers().filter(u=>u.id!==uid)); switchAdminTab('users'); showToast('User dihapus.','warning'); } }
    function buatKode() { const uf = document.getElementById('adminCodeUser').value.trim(), pid = document.getElementById('adminCodePackage').value; if (!uf) { showToast('Masukkan username!','error'); return; } const code = 'MK-'+Date.now().toString(36).toUpperCase(); const codes = MS.getValidCodes(); codes[code] = { packageId:pid, used:false, createdAt:new Date().toISOString() }; MS.saveValidCodes(codes); document.getElementById('codeResult').innerHTML = `<p class="form-success show">✅ Kode: <strong>${code}</strong></p>`; renderActiveCodes(); }
    function renderActiveCodes() { const el = document.getElementById('activeCodes'); if (el) { const codes = MS.getValidCodes(); el.innerHTML = Object.keys(codes).length===0 ? '<p class="text-muted">Belum ada kode.</p>' : Object.keys(codes).map(c => `<div>${c} - ${codes[c].packageId} (${codes[c].used?'Terpakai':'Aktif'})</div>`).join(''); } }
    function renderPackageList() { const el = document.getElementById('packageList'); if (el) el.innerHTML = MS.getPackages().map(p => `<div>${p.name} - ${MS.formatPrice(p.price)} (${p.label})</div>`).join(''); }
    function tambahPaket() { const pkgs = MS.getPackages(); pkgs.push({ id:'pkg_'+Date.now(), name:'Paket Baru', price:0, days:30, label:'1 Bulan' }); MS.savePackages(pkgs); renderPackageList(); showToast('Paket baru ditambahkan.','success'); }

    // ========== BACKUP RESTORE ==========
    function backupAllDataJSON() { const allData = {}; for (let i=0;i<localStorage.length;i++) { const key = localStorage.key(i); allData[key] = localStorage.getItem(key); } const blob = new Blob([JSON.stringify(allData,null,2)], {type:'application/json'}); const a = document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='musikplus_full_backup_'+new Date().toISOString().slice(0,10)+'.json'; a.click(); showToast('✅ Backup JSON berhasil!','success'); }
    function restoreAllDataJSON(input) { const file = input.files[0]; if (!file) return; if (!confirm('⚠️ SEMUA data akan ditimpa. Lanjutkan?')) return; const reader = new FileReader(); reader.onload = function(e) { try { const data = JSON.parse(e.target.result); localStorage.clear(); Object.keys(data).forEach(key => localStorage.setItem(key, data[key])); showToast('✅ Data di-restore! Refresh...','success'); setTimeout(()=>location.reload(),2000); } catch(err) { showToast('❌ File JSON tidak valid.','error'); } }; reader.readAsText(file); }
    function downloadOfflineHTML() { const html = '<!DOCTYPE html>\n'+document.documentElement.outerHTML; const blob = new Blob([html], {type:'text/html'}); const a = document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='musikplus_offline_'+new Date().toISOString().slice(0,10)+'.html'; a.click(); showToast('⬇ HTML didownload!','success'); }
    function restoreFromHTML(input) { const file = input.files[0]; if (!file) return; if (!confirm('⚠️ Halaman akan diganti. Lanjutkan?')) return; const reader = new FileReader(); reader.onload = function(e) { const match = e.target.result.match(/<html[^>]*>([\s\S]*)<\/html>/i); if (match) { document.documentElement.innerHTML = match[1]; showToast('✅ Dipulihkan! Refresh...','success'); setTimeout(()=>location.reload(),1500); } else { document.open(); document.write(e.target.result); document.close(); showToast('✅ Dipulihkan! Refresh...','success'); setTimeout(()=>location.reload(),1500); } }; reader.readAsText(file); }

    // ========== PROFIL ==========
    function loadProfile() { const s = MS.getSession(); if (!s) return; document.getElementById('profileAvatarBig').textContent = s.nama.charAt(0).toUpperCase(); document.getElementById('profileName').textContent = s.nama; document.getElementById('profileRole').textContent = s.role==='superadmin'?'Super Admin':(s.premium?'User Premium':'User Biasa'); document.getElementById('editProfileNama').value = s.nama||''; document.getElementById('editProfileEmail').value = s.email||''; document.getElementById('editProfileHp').value = s.hp||''; }
    function saveProfile() { const s = MS.getSession(); if (!s) return; const n = document.getElementById('editProfileNama').value.trim(), e = document.getElementById('editProfileEmail').value.trim(), hp = document.getElementById('editProfileHp').value.trim(); const err = document.getElementById('profileError'), suc = document.getElementById('profileSuccess'); err.textContent=''; suc.textContent=''; if (!n||!e||!hp) { err.textContent='Semua field wajib!'; err.classList.add('show'); return; } s.nama=n; s.email=e; s.hp=hp; MS.saveSession(s); const users = MS.getAllUsers(); const idx = users.findIndex(u=>u.id===s.id); if (idx!==-1) { users[idx].nama=n; users[idx].email=e; users[idx].hp=hp; MS.saveAllUsers(users); } updateHeader(); suc.textContent='Profil tersimpan!'; suc.classList.add('show'); setTimeout(()=>MS.navigate('dashboard'),1500); }
    function deleteAccount() { const s = MS.getSession(); if (!s||s.role==='superadmin') { showToast('Super Admin tidak bisa dihapus.','error'); return; } if (confirm('Hapus akun permanen?')) { MS.saveAllUsers(MS.getAllUsers().filter(u=>u.id!==s.id)); MS.clearSession(); updateHeader(); MS.navigate('landing'); showToast('Akun dihapus.','warning'); } }

    // ========== CHAT (MINIMAL - PASTI BERFUNGSI) ==========
    function loadChatMessages() {
      var allMessages = MS.getChatMessages();
      var session = MS.getSession();
      var currentUser = session ? session.username : 'guest';
      var isAdmin = session && session.role === 'superadmin';

      var filtered = [];
      if (isAdmin) {
        filtered = allMessages;
      } else {
        filtered = allMessages.filter(function(m) {
          return (m.from === currentUser && m.to === 'admin') ||
                 (m.from === 'admin' && m.to === currentUser) ||
                 (m.from === 'admin' && m.to === 'all');
        });
      }

      var container = document.getElementById('chatMessages');
      if (!container) return;

      if (filtered.length === 0) {
        container.innerHTML = '<p style="color:gray;text-align:center;padding:20px;">Belum ada pesan. Kirim pesan pertama!</p>';
        return;
      }

      filtered.sort(function(a, b) { return new Date(a.time) - new Date(b.time); });

      var html = '';
      for (var i = 0; i < filtered.length; i++) {
        var m = filtered[i];
        var isMe = (m.from === currentUser) || (isAdmin && m.from === 'admin');
        var bg = isMe ? 'var(--accent-primary)' : 'var(--bg-hover)';
        var color = isMe ? '#fff' : 'var(--text-primary)';
        var align = isMe ? 'right' : 'left';
        html += '<div style="margin-bottom:8px;text-align:' + align + ';">';
        html += '<div style="font-size:0.7rem;color:gray;margin-bottom:2px;"><strong>' + MS.escapeHTML(m.from) + '</strong> · ' + new Date(m.time).toLocaleTimeString('id-ID', {hour:'2-digit',minute:'2-digit'}) + '</div>';
        html += '<div style="display:inline-block;max-width:80%;padding:8px 14px;border-radius:16px;background:' + bg + ';color:' + color + ';">' + MS.escapeHTML(m.text) + '</div>';
        html += '</div>';
      }
      container.innerHTML = html;
      container.scrollTop = container.scrollHeight;
    }

    function sendChatMessage() {
      var input = document.getElementById('chatInput');
      if (!input) return;
      var text = input.value.trim();
      if (!text) return;

      var session = MS.getSession();
      var currentUser = session ? session.username : 'guest';
      var isAdmin = session && session.role === 'superadmin';

      var newMsg = {
        from: isAdmin ? 'admin' : currentUser,
        to: isAdmin ? 'all' : 'admin',
        text: text,
        time: new Date().toISOString()
      };

      var msgs = MS.getChatMessages();
      msgs.push(newMsg);
      MS.saveChatMessages(msgs);
      input.value = '';
      loadChatMessages();
      showToast('Pesan terkirim!', 'success');
    }

    function clearAllChat() {
      if (confirm('Hapus semua chat?')) {
        MS.saveChatMessages([]);
        loadChatMessages();
        showToast('Chat dihapus.', 'warning');
      }
    }

    // ========== EXPORT USER ==========
    function exportData() { const s = MS.getSession(); if (!s) return; const data = { username:s.username, projects:MS.getProjects(s.username), exportedAt:new Date().toISOString() }; const blob = new Blob([JSON.stringify(data,null,2)],{type:'application/json'}); const a = document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='musikplus_'+s.username+'.json'; a.click(); showToast('Data diekspor!','success'); }
    function restoreData(input) { if (!input.files[0]) return; const reader = new FileReader(); reader.onload = function(e) { try { const data=JSON.parse(e.target.result); if (data.projects) { MS.saveProjects(MS.getSession().username, data.projects); showToast('Data dipulihkan!','success'); } } catch(ex) { showToast('File tidak valid!','error'); } }; reader.readAsText(input.files[0]); }

    // ========== PAGE INIT ==========
    MS.pageInit = function(page, params) {
      updateHeader();
      if (page === 'landing') { const grid=document.getElementById('landingPriceGrid'); if (grid) grid.innerHTML=MS.getPackages().map((p,i)=>`<div class="price-card ${i===1?'featured':''}" onclick="MS.navigate('auth',{mode:'register'})">${i===1?'<div class="featured-badge">POPULER</div>':''}<div class="price-icon">💎</div><div class="price-name">${p.name}</div><div class="price-value">${MS.formatPrice(p.price)}</div><div class="price-duration">${p.label}</div></div>`).join(''); }
      if (page === 'dashboard') { const s=MS.getSession(); if (!s) return; document.getElementById('dashAvatar').textContent=s.nama.charAt(0).toUpperCase(); document.getElementById('dashGreeting').textContent='Selamat datang, '+s.nama+'!'; const prem=MS.isPremium(); document.getElementById('dashStatus').textContent=prem?'⭐ Premium':'Free'; document.getElementById('premiumExpiryBanner').classList.toggle('hidden',!prem); if (prem&&s.premiumExpiry) document.getElementById('premiumExpiryText').textContent=' Berlaku hingga '+MS.formatDate(s.premiumExpiry); const proj=MS.getProjects(s.username); document.getElementById('statProjects').textContent=proj.length; document.getElementById('statTracks').textContent=proj.reduce((a,p)=>a+(p.tracks||[]).length,0); document.getElementById('statPremiumDays').textContent=prem?(s.role==='superadmin'?'∞':Math.max(0,Math.ceil((new Date(s.premiumExpiry)-new Date())/86400000))+' hari'):'0'; }
      if (page === 'proyek-list') renderProyekList();
      if (page === 'proyek-editor') { const s=MS.getSession(); if (!s) return; const p=MS.getProjects(s.username).find(x=>x.id===params.proyekId); if (!p) return; window._editorProject=p; window._editorUsername=s.username; document.getElementById('editorProjectName').textContent=p.nama; document.getElementById('editorTrackCount').textContent=(p.tracks||[]).length+' trek'; renderTracks(); }
      if (page === 'auth') { const mode=params&&params.mode?params.mode:'login'; switchAuthTab(mode); }
      if (page === 'admin-panel') { const s=MS.getSession(); if (!s||s.role!=='superadmin') { MS.navigate('dashboard'); showToast('Akses ditolak.','error'); return; } switchAdminTab('users'); }
      if (page === 'profile') loadProfile();
      if (page === 'premium') {
        renderPremiumPackages();
        const s = MS.getSession();
        if (s) {
          const prem = MS.isPremium();
          const statusEl = document.getElementById('premiumStatusText');
          const expEl = document.getElementById('premiumExpiryText');
          if (prem) {
            if (statusEl) { statusEl.textContent = '⭐ Premium Aktif'; statusEl.style.color = 'var(--color-success)'; }
            if (expEl) { expEl.textContent = s.premiumExpiry ? 'Berlaku hingga ' + MS.formatDate(s.premiumExpiry) : 'Akses Penuh (Super Admin)'; }
          } else {
            if (statusEl) { statusEl.textContent = 'Free (Terbatas)'; statusEl.style.color = 'var(--color-warning)'; }
            if (expEl) expEl.textContent = 'Anda belum mengaktifkan Premium.';
          }
        }
      }
      if (page === 'ai-voice-select') renderVoiceGrid();
      if (page === 'hasil-generate') { const stored=localStorage.getItem('ms_last_generated'); if (stored) { try { renderHasil(JSON.parse(stored)); } catch(e) { document.getElementById('hasilContainer').innerHTML='<p class="text-warning">Data tidak valid.</p>'; } } else { document.getElementById('hasilContainer').innerHTML='<p class="text-secondary">Belum ada hasil.</p>'; } }
      if (page === 'download-manager') { const session=MS.getSession(); const downloads=JSON.parse(localStorage.getItem('ms_download_log_'+(session?session.username:'guest'))||'[]'); renderDownloadList(downloads); window._downloads=downloads; }
      if (page === 'chat') {
        setTimeout(function() {
          loadChatMessages();
        }, 200);
      }
    };
  </script>
</body>
</html>
